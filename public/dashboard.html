<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOS - Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body {
            background: radial-gradient(circle at top right, #1e222b, #0f1115);
            color: white; min-height: 100vh; padding: 30px; display: flex; flex-direction: column; gap: 35px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: -1px; }
        .logo span { color: #3b82f6; }
        
        .btn { border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .settings-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .settings-btn:hover { background: rgba(255,255,255,0.12); }

        /* GRID UTAMA */
        .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; align-items: start; }
        .status-sidebar { display: flex; flex-direction: column; gap: 20px; }

        .card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px); border-radius: 16px; padding: 25px;
        }
        .card h3 { font-size: 12px; color: #9ca3af; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 0.5px; }
        .card .value { font-size: 32px; font-weight: bold; }
        .card .value span { font-size: 16px; color: #9ca3af; }
        
        .chart-container { min-height: 440px; display: flex; flex-direction: column; justify-content: space-between; }
        canvas { width: 100% !important; height: 340px !important; }

        /* MONITOR SECTOR */
        .monitor-section { width: 100%; }
        .monitor-section h2 { font-size: 18px; margin-bottom: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .monitor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .app-card { display: flex; flex-direction: column; justify-content: space-between; min-height: 140px; }
        .app-info { display: flex; gap: 15px; align-items: flex-start; }
        .app-icon-box { width: 48px; height: 48px; border-radius: 12px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); display: flex; justify-content: center; align-items: center; font-size: 20px; color: #3b82f6; }
        .app-details h4 { font-size: 16px; margin-bottom: 4px; color: #f3f4f6; text-transform: capitalize; }
        .app-details p { font-size: 12px; color: #9ca3af; line-height: 1.4; word-break: break-all; margin-bottom: 5px; }
        
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .status-running { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-stopped { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

        /* CONFIG MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 100; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background: #14171e; border: 1px solid rgba(255,255,255,0.08); width: 90%; max-width: 460px; border-radius: 16px; padding: 30px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;}
        .close-modal { background: none; border: none; color: #9ca3af; font-size: 24px; cursor: pointer; }
        .setting-section { margin-bottom: 20px; border-bottom: none; padding-bottom: 0; }
        .toggle-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; }
        .save-btn { background: #3b82f6; color: white; width: 100%; padding: 12px; border-radius: 8px; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } .chart-container { min-height: auto; } canvas { height: 200px !important; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Cloud<span>Monitor</span></div>
    <button class="btn settings-btn" onclick="toggleSettingsModal(true)"><i class="fa-solid fa-sliders"></i> Pengaturan</button>
</div>

<div class="main-layout">
    <div class="card chart-container">
        <h3>Real-time Processor Trend</h3>
        <canvas id="cpuChart"></canvas>
    </div>

    <div class="status-sidebar">
        <div class="card" id="card-cpu">
            <h3><i class="fa-solid fa-microchip" style="color: #3b82f6;"></i> CPU Load</h3>
            <div class="value" id="cpu-text">0<span>%</span></div>
        </div>
        <div class="card" id="card-ram">
            <h3><i class="fa-solid fa-memory" style="color: #a855f7;"></i> Memory Usage</h3>
            <div class="value" id="ram-text">0<span>%</span></div>
        </div>
        <div class="card" id="card-uptime">
            <h3><i class="fa-solid fa-clock" style="color: #eab308;"></i> System Uptime</h3>
            <div class="value" id="uptime-text">0<span>s</span></div>
        </div>
        <div class="card" id="card-temp">
            <h3><i class="fa-solid fa-temperature-half" style="color: #ef4444;"></i> Core Temp</h3>
            <div class="value" id="temp-text">0<span>°C</span></div>
        </div>
    </div>
</div>

<div class="monitor-section">
    <h2><i class="fa-solid fa-cubes" style="color: #a855f7;"></i> Active Docker Containers (<span id="container-count">0</span>)</h2>
    <div class="monitor-grid" id="containers-container"></div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <div class="modal-header">
            <h2><i class="fa-solid fa-gear"></i> Control Center</h2>
            <button class="close-modal" onclick="toggleSettingsModal(false)">&times;</button>
        </div>
        <form id="settingsForm">
            <div class="setting-section">
                <h4>Dashboard Layout Modules</h4>
                <div class="toggle-group"><label>Tampilkan Status CPU</label><input type="checkbox" id="set-showCpu"></div>
                <div class="toggle-group"><label>Tampilkan Penggunaan RAM</label><input type="checkbox" id="set-showRam"></div>
                <div class="toggle-group"><label>Tampilkan Uptime Sistem</label><input type="checkbox" id="set-showUptime"></div>
                <div class="toggle-group"><label>Tampilkan Suhu Perangkat</label><input type="checkbox" id="set-showTemp"></div>
                <div class="toggle-group" style="margin-top: 15px;">
                    <label>Maksimal Titik Grafik Tren</label>
                    <input type="number" id="set-chartPoints" min="5" max="50" style="width: 60px; background: #000; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 4px; border-radius: 6px; text-align: center;">
                </div>
            </div>
            <button type="submit" class="btn save-btn">Terapkan Konfigurasi</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
