<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Pusat Kendali - Dashboard STB</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b111e; background-image: radial-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 0); background-size: 24px 24px; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; padding: 30px; display: flex; flex-direction: column; gap: 25px; }
        .app-container { max-width: 1400px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 25px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 20px; }
        .logo { font-size: 22px; font-weight: 700; color: #ffffff; display: flex; align-items: center; gap: 10px; }
        .logo span { color: #00ffcc; background: rgba(0, 255, 204, 0.08); padding: 4px 10px; border-radius: 6px; font-size: 14px; font-weight: 600; }
        
        .btn { border: none; padding: 10px 18px; border-radius: 6px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
        .settings-btn { background: rgba(0, 255, 204, 0.05); border: 1px solid rgba(0, 255, 204, 0.3); color: #00ffcc; }
        .settings-btn:hover { background: #00ffcc; color: #0b111e; }
        .prune-btn { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; padding: 6px 12px; font-size: 11px; border-radius: 4px; }

        .main-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; }
        .status-sidebar { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 24px; }
        .card .value { font-size: 32px; font-weight: 700; color: #ffffff; }
        .card .value span { font-size: 16px; color: #6b7280; margin-left: 4px; }
        
        .services-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .monitor-rack { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 10px; min-height: 100px; }
        .iframe-container { width: 100%; height: 500px; border-radius: 8px; overflow: hidden; border: 1px solid #1f2937; }

        /* --- Perbaikan Responsif Mobile --- */
        @media (max-width: 960px) {
            .main-layout, .services-wrapper { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .status-sidebar { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            body { padding: 15px; }
            .card .value { font-size: 24px; }
            .iframe-container { height: 300px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo" id="main-app-logo">Sistem Pusat Kendali <span id="main-app-host">STB-SERVER</span></div>
        <div class="header-info" style="text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #9ca3af;">
            <div id="live-time" style="font-size: 16px; color: #ffffff; font-weight: 600;">--:--:--</div>
            <div id="weather-info"><span id="location">Mendeteksi lokasi...</span> | <span id="temp">--°C</span></div>
        </div>
        <button class="btn settings-btn" onclick="toggleSettingsModal(true)"><i class="fa-solid fa-gear"></i> Pengaturan</button>
    </div>

    <div class="main-layout">
        <div class="card"><canvas id="cpuChart"></canvas></div>
        <div class="status-sidebar">
            <div class="card"><h3>CPU</h3><div class="value" id="cpu-text">0%</div></div>
            <div class="card"><h3>RAM</h3><div class="value" id="ram-text">0%</div></div>
            <div class="card"><h3>UPTIME</h3><div class="value" id="uptime-text">0s</div></div>
            <div class="card"><h3>TEMP</h3><div class="value" id="temp-text">0°C</div></div>
        </div>
    </div>

    <div class="services-wrapper">
        <div class="monitor-section">
            <div class="monitor-header"><h2>Layanan System</h2></div>
            <div class="monitor-rack" id="system-services-container"></div>
        </div>
        <div class="monitor-section">
            <div class="monitor-header"><h2>Kontainer Docker</h2><button class="btn prune-btn" onclick="pruneContainers()">Bersihkan</button></div>
            <div class="monitor-rack" id="docker-services-container"></div>
        </div>
    </div>

    <div class="file-manager-wrapper" style="background: #111827; padding: 20px; border-radius: 12px; border: 1px solid #1f2937;">
        <h2>File Manager</h2>
        <div class="iframe-container"><iframe src="http://192.168.18.10:8080" style="width:100%; height:100%; border:none;"></iframe></div>
    </div>
</div>

<div id="settingsModal" class="modal-overlay"><div class="modal">...</div></div>
<script src="script.js?v=100"></script>
</body>
</html>
